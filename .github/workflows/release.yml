name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  # ── Windows ──────────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag.TrimStart('v')
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Install NSIS
        run: choco install nsis --no-progress -y

      - name: Build NSIS installer
        shell: pwsh
        run: |
          $buildDir = "${{ github.workspace }}\build\windows\x64\runner\Release"
          $ver      = "${{ steps.version.outputs.VERSION }}"
          makensis `
            /DAPP_VERSION="$ver" `
            /DBUILD_DIR="$buildDir" `
            windows\installer\installer.nsi

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: RedmineMonitor-${{ steps.version.outputs.VERSION }}-windows-setup.exe
          retention-days: 1

  # ── macOS ────────────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS app (unsigned)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS release
        run: flutter build macos --release

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          echo "VERSION=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Zip .app bundle
        run: |
          cd build/macos/Build/Products/Release
          zip -r --symlinks \
            "${{ github.workspace }}/RedmineMonitor-${{ steps.version.outputs.VERSION }}-macos.zip" \
            "Redmine Monitor.app"

      - name: Upload macOS zip
        uses: actions/upload-artifact@v4
        with:
          name: macos-zip
          path: RedmineMonitor-${{ steps.version.outputs.VERSION }}-macos.zip
          retention-days: 1

  # ── GitHub Release ───────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest

    steps:
      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          echo "VERSION=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Redmine Monitor v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            artifacts/windows-installer/RedmineMonitor-${{ steps.version.outputs.VERSION }}-windows-setup.exe
            artifacts/macos-zip/RedmineMonitor-${{ steps.version.outputs.VERSION }}-macos.zip
